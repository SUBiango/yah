<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Scanner - YAH Event Check-in</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="css/main.css" rel="stylesheet">
</head>
<body class="scanner-page">
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="text-center">
            <div class="scanner-spinner"></div>
            <div style="color:#fff;margin-top:1rem;">Processing...</div>
        </div>
    </div>

    <!-- Authentication Gate -->
    <div class="scanner-wrap" id="authGate">
        <div class="scanner-card-header">
            <h2><i class="fas fa-qrcode"></i> Event Check-in Scanner</h2>
            <p style="margin:0;opacity:.85;">Authenticate to start scanning participant QR codes</p>
        </div>
        <div class="scanner-card-body text-center">
            <form id="authForm" style="max-width:300px;margin:0 auto;">
                <div class="form-group">
                    <label class="form-label" for="staffCode">Staff Access Code</label>
                    <input type="password" class="form-control" id="staffCode"
                           placeholder="Enter staff code" required style="text-align:center;font-size:1.1rem;">
                </div>
                <button type="submit" class="btn btn--primary btn--lg w-100">
                    <span class="btn-text">Access Scanner</span>
                    <span class="btn-loading" style="display:none;"><i class="fas fa-spinner fa-spin"></i></span>
                </button>
                <div id="authAlert" class="mt-2"></div>
            </form>
        </div>
    </div>

    <!-- Scanner Interface -->
    <div class="scanner-wrap" id="scannerInterface" style="display:none;">
        <div class="scanner-card-header">
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <h2><i class="fas fa-qrcode"></i> Event Check-in</h2>
                <button class="btn btn--sm" style="background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.4);" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
            <p style="margin:0;opacity:.85;">Scan participant QR codes for event entry</p>
        </div>

        <div class="scanner-card-body">
            <!-- Stats -->
            <div class="scanner-stats">
                <div class="scanner-stat-card">
                    <div class="scanner-stat-number" id="totalCheckedIn">0</div>
                    <div class="scanner-stat-label">Checked In</div>
                </div>
                <div class="scanner-stat-card">
                    <div class="scanner-stat-number" id="totalRegistered">0</div>
                    <div class="scanner-stat-label">Total Registered</div>
                </div>
                <div class="scanner-stat-card">
                    <div class="scanner-stat-number" id="attendanceRate">0%</div>
                    <div class="scanner-stat-label">Attendance Rate</div>
                </div>
            </div>

            <!-- Scanner Controls -->
            <div class="text-center mb-3">
                <button class="btn btn--success btn--lg" id="startScanBtn">
                    <i class="fas fa-camera"></i> Start Scanning
                </button>
                <button class="btn btn--lg" style="background:var(--color-warning);color:#fff;" id="stopScanBtn" style="display:none;">
                    <i class="fas fa-stop"></i> Stop Scanning
                </button>
            </div>

            <div id="qr-reader"></div>

            <!-- Scan Result -->
            <div id="scanResult" class="scan-result" style="display:none;">
                <div style="display:flex;align-items:center;gap:.75rem;">
                    <div id="resultIcon"></div>
                    <div id="resultMessage"></div>
                </div>
                <div id="participantInfo" class="scanner-details" style="display:none;">
                    <div style="display:flex;align-items:center;gap:1rem;">
                        <div class="participant-avatar" id="participantAvatar"></div>
                        <div style="flex:1;">
                            <h5 style="margin:0 0 .25rem;" id="participantName"></h5>
                            <p style="margin:0 0 .25rem;" id="participantEmail"></p>
                            <small class="text-muted" id="participantId"></small>
                        </div>
                        <div>
                            <span class="badge badge--success" id="checkinTime"></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Manual Entry -->
            <details style="margin-top:1rem;">
                <summary style="cursor:pointer;padding:.75rem;background:var(--color-gray-100);border-radius:8px;font-weight:600;">
                    Manual Entry (Backup)
                </summary>
                <div style="padding:1rem;border:1px solid var(--color-gray-200);border-top:none;border-radius:0 0 8px 8px;">
                    <form id="manualEntryForm">
                        <div class="form-group">
                            <label class="form-label" for="registrationId">Registration ID</label>
                            <input type="text" class="form-control" id="registrationId" placeholder="Enter registration ID">
                        </div>
                        <button type="submit" class="btn btn--primary btn--sm">
                            <i class="fas fa-check"></i> Check In Manually
                        </button>
                    </form>
                </div>
            </details>

            <!-- Recent Scans -->
            <div class="recent-scans" style="margin-top:1rem;">
                <h6 style="padding:.75rem;margin:0;background:var(--color-gray-100);border-radius:8px 8px 0 0;font-weight:600;">Recent Check-ins</h6>
                <div id="recentScans">
                    <div class="text-center text-muted" style="padding:1.5rem;">No check-ins yet</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="js/scanner.js?v=20250928-scanapp-fix"></script>
</body>
</html>
